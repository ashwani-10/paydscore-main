<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paydscore - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7fa;
            /* Matches the background in the image */
            --card-bg: #ffffff;
            --title-color: #1a2b4b;
            /* Dark navy/charcoal for the title */
            --text-color: #525f7f;
            /* Slate gray for the description */
            --accent-green: #22c55e;
            --shadow: 0 15px 35px rgba(50, 50, 93, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, #ebf1f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
        }

        .card {
            background: var(--card-bg);
            padding: 56px 48px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 540px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            color: var(--title-color);
        }

        p {
            font-size: 16px;
            color: var(--text-color);
            margin-bottom: 40px;
            font-weight: 400;
            line-height: 1.6;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: #8898aa;
        }

        .check-box {
            width: 18px;
            height: 18px;
            background: #2ed47a;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-icon {
            width: 10px;
            height: 10px;
            fill: white;
        }

        .footer a {
            color: #8898aa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--title-color);
        }

        @media (max-width: 480px) {
            .card {
                padding: 40px 24px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo-container">
            <img src="https://paydscore-documents.s3.ap-south-1.amazonaws.com/logo.jpeg" alt="Paydscore Logo"
                class="logo-img">
        </div>

        <h1>Paydscore is coming soon</h1>

        <p>Welcome to the next generation of payment reliability & payment trust scoring. Our platform is under
            development and launch is imminent! Watch this space for updates.</p>

        <div class="footer">
            <div class="check-box">
                <svg class="check-icon" viewBox="0 0 10 7" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 3.5L3.5 6L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            Stay tuned: <a href="https://paydscore.com">paydscore.com</a>
        </div>
    </div>
</body>

</html>
